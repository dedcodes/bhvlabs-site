<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BHV Labs</title>
  <meta name="description" content="BHV Labs builds independent software products." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #0f172a;
      background: #fafafa;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 96px 24px 60px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: #0f172a;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.5px;
      margin-bottom: 36px;
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -1.2px;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 1.15rem;
      color: #64748b;
      margin-bottom: 56px;
      font-weight: 400;
      max-width: 480px;
    }
    .section { margin-bottom: 36px; }
    h2 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    p { font-size: 1.0rem; color: #334155; }
    a {
      color: #0f172a;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
      transition: opacity 0.15s ease;
    }
    a:hover { opacity: 0.6; }
    .footer {
      margin-top: 96px;
      padding-top: 28px;
      border-top: 1px solid #e2e8f0;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .footer p { font-size: 0.85rem; color: #94a3b8; margin-bottom: 4px; }
    @media (max-width: 480px) {
      .container { padding: 64px 20px 40px; }
      h1 { font-size: 2rem; }
      .tagline { font-size: 1.05rem; margin-bottom: 48px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">BHV</div>
    <h1>BHV Labs</h1>
    <p class="tagline">Building independent software products.</p>
    <div class="section">
      <h2>Contact</h2>
      <p><a href="mailto:hello@bhvlabs.dev">hello@bhvlabs.dev</a></p>
    </div>
    <div class="footer">
      <p>BHV Labs is a product line of Blue Horizon Ventures, LLC.</p>
      <p>Registered in New Jersey, United States.</p>
    </div>
  </div>
</body>
</html>
